server {
    listen 80;
    server_name _;

    # Serve the built single-page app.
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service (Docker DNS name "backend").
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;          # answer synthesis can take a few seconds
        client_max_body_size 50m;         # allow larger document uploads
    }

    # SPA fallback: any non-file route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
