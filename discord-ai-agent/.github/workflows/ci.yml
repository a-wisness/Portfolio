name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check — non-blocking)
        # Type errors are tracked tech debt (discord.py / SQLModel typing friction);
        # surfaced on every run but not yet a merge gate.
        run: mypy bot/
        continue-on-error: true

      - name: Pytest with coverage
        run: pytest -q --cov=bot --cov-report=term-missing --cov-report=xml --cov-fail-under=40

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t discord-ai-agent:ci .
